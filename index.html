<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhavi Industries</title>
<style>
/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  position: relative;
  z-index: 10; /* header above slider */
}

.logo img {
  height: 50px;
}

.menu-btn {
  font-size: 28px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: -250px;  /* hidden by default */
  top: 0;
  width: 250px;
  height: 100%;
  background: #0056a3;
  color: white;
  padding: 20px;
  transition: 0.3s;
  z-index: 9999;  /* very high so it stays on top */
}

.sidebar a {
  display: block;
  color: white;
  padding: 10px 0;
  text-decoration: none;
}

/* SLIDER */
.slider {
  position: relative;
  height: 400px;
  overflow: hidden;
  z-index: 1; /* slider under menu */
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: 1s;
  z-index: 1; /* each slide under menu */
}

.slide.active {
  opacity: 1;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SECTIONS */
.section {
  padding: 50px;
  text-align: center;
}

.blue {
  background: #0056a3;
  color: white;
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  background: #0056a3;
  color: white;
  border: none;
  cursor: pointer;
}

/* RESPONSIVE: optional small screens */
@media (max-width: 768px) {
  .slider {
    height: 250px;
  }
  .sidebar {
    width: 200px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo">
    <!-- replace with your logo file -->
    <img src="images/logo.png" alt="Chhavi Industries">
  </div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="products.html">Products</a>
  <a href="industries.html">Industries</a>
  <a href="contact.html">Contact</a>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slide active">
    <img src="images/banner1.jpeg" alt="Banner 1">
  </div>
  <div class="slide">
    <img src="images/banner2.jpeg" alt="Banner 2">
  </div>
  <div class="slide">
    <img src="images/banner5.jpeg" alt="Banner 5">
  </div>
  <div class="slide">
    <img src="images/banner4.jpeg" alt="Banner 4">
  </div>
</div>



<!-- INDUSTRIES -->
<div class="section blue" id="industries">
  <h2>Industries We Serve</h2>
  <p>Textile | Packaging | Printing | Industrial </p>
</div>



<script>
/* MENU TOGGLE */
function toggleMenu() {
  const menu = document.getElementById("menu");
  if(menu.style.left === "0px") {
    menu.style.left = "-250px";
  } else {
    menu.style.left = "0px";
  }
}

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 4000);
</script>

</body>
</html>
