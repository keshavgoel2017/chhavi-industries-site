<!DOCTYPE html>
<html>
<head>
  <title>Menu Test</title>

  <style>
    body {
      margin: 0;
      padding-top: 60px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #003366;
      display: flex;
      align-items: center;
      z-index: 1000;
    }

    .menu-icon {
      font-size: 28px;
      color: white;
      margin-left: 15px;
      cursor: pointer;
    }

    .logo {
      height: 40px;
      margin-left: auto;
      margin-right: 15px;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background: #002244;
      padding-top: 60px;
      transition: 0.3s;
      z-index: 999;
    }

    .side-menu a {
      display: block;
      color: white;
      padding: 15px;
      text-decoration: none;
    }

    .side-menu.active {
      left: 0;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <img src="images/logo.png" class="logo">
</div>

<div id="sideMenu" class="side-menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Products</a>
</div>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("active");
}
</script>

</body>
</html>
